name: CI

on:
  push:
    paths-ignore:
      - "README*.md"
      - "CHANGELOG.md"
      - "LICENSE"
      - "docs/**"
      - "**.md"
  pull_request:
    paths-ignore:
      - "README*.md"
      - "CHANGELOG.md"
      - "LICENSE"
      - "docs/**"
      - "**.md"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
        working-directory: app
      - run: npm run build
        working-directory: app

  frozen-sidecar:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            binary: app/src-tauri/binaries/ferry-engine-aarch64-apple-darwin
          - os: windows-2022
            target: x86_64-pc-windows-msvc
            binary: app/src-tauri/binaries/ferry-engine-x86_64-pc-windows-msvc.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-build.txt
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
        with:
          target: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: app/src-tauri -> target
          key: ${{ matrix.target }}
      - run: python -m pip install -r requirements-build.txt
      - run: python scripts/build-sidecar.py --clean --target "$BUILD_TARGET"
        shell: bash
        env:
          BUILD_TARGET: ${{ matrix.target }}
      - run: cargo check --locked --target "$BUILD_TARGET"
        shell: bash
        env:
          BUILD_TARGET: ${{ matrix.target }}
        working-directory: app/src-tauri
      - name: Frozen sidecar smoke
        shell: python
        env:
          SIDECAR: ${{ matrix.binary }}
        run: |
          import json, os, subprocess
          for method in ("health", "version", "env"):
              process = subprocess.run(
                  [os.environ["SIDECAR"], "rpc"],
                  input=json.dumps({"method": method}) + "\n",
                  text=True, capture_output=True, check=True, timeout=30)
              response = json.loads(process.stdout.splitlines()[0])
              assert response["ok"], (method, response, process.stderr)
              if method == "health":
                  assert response["result"]["status"] == "ok", response
              elif method == "version":
                  assert response["result"], response
              else:
                  assert set(response["result"]) == {"claude", "codex", "opencode"}, response
