name: CI

on:
  push:
    paths-ignore:
      - "README*.md"
      - "CHANGELOG.md"
      - "LICENSE"
      - "docs/**"
      - "**.md"
  pull_request:
    paths-ignore:
      - "README*.md"
      - "CHANGELOG.md"
      - "LICENSE"
      - "docs/**"
      - "**.md"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            app/package-lock.json
            agent-runtime/package-lock.json
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-test.txt
      - run: npm ci
        working-directory: agent-runtime
      - run: npm run format:check && npm run typecheck && npm test && npm run build
        working-directory: agent-runtime
      - run: npm ci
        working-directory: app
      - run: npm run check:boundaries && npm test && npm run build
        working-directory: app
      - run: python -m pip install -r requirements-test.txt
      - run: python scripts/check-no-agent-versioning.py
      - run: python scripts/check-no-legacy-runtime.py
      - run: python scripts/generate-contracts.py --check
      - run: python scripts/check-canonical-tool-result.py
      - run: python scripts/check-canonical-session.py
      - run: python -m pytest

  rust-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: app/src-tauri -> target
          key: quality
      - run: cargo fmt --check
        working-directory: app/src-tauri
      - run: cargo clippy --all-targets --locked -- -D warnings
        working-directory: app/src-tauri
      - run: cargo test --locked
        working-directory: app/src-tauri
      - run: cargo check --locked
        working-directory: app/src-tauri

  frozen-sidecar-windows:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            target: x86_64-pc-windows-msvc
            binary: app/src-tauri/binaries/ferry-engine-x86_64-pc-windows-msvc.exe
            agent-binary: app/src-tauri/binaries/ferry-agent-x86_64-pc-windows-msvc.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-build.txt
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: agent-runtime/package-lock.json
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
        with:
          target: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: app/src-tauri -> target
          key: ${{ matrix.target }}
      - run: python -m pip install -r requirements-build.txt
      - run: npm ci
        working-directory: agent-runtime
      - run: npm run build:sea -- "$BUILD_TARGET"
        shell: bash
        env:
          BUILD_TARGET: ${{ matrix.target }}
        working-directory: agent-runtime
      - run: python scripts/build-sidecar.py --clean --target "$BUILD_TARGET"
        shell: bash
        env:
          BUILD_TARGET: ${{ matrix.target }}
      - run: cargo check --locked --target "$BUILD_TARGET"
        shell: bash
        env:
          BUILD_TARGET: ${{ matrix.target }}
        working-directory: app/src-tauri
      - run: cargo test --locked --target "$BUILD_TARGET"
        shell: bash
        env:
          BUILD_TARGET: ${{ matrix.target }}
        working-directory: app/src-tauri
      - name: Frozen sidecar smoke
        shell: python
        env:
          SIDECAR: ${{ matrix.binary }}
        run: |
          import json, os, subprocess
          for method in ("health", "version", "env"):
              process = subprocess.run(
                  [os.environ["SIDECAR"], "rpc"],
                  input=json.dumps({"method": method}) + "\n",
                  text=True, capture_output=True, check=True, timeout=30)
              response = json.loads(process.stdout.splitlines()[0])
              assert response["ok"], (method, response, process.stderr)
              if method == "health":
                  assert response["result"]["status"] == "ok", response
              elif method == "version":
                  assert response["result"], response
              else:
                  assert set(response["result"]) == {"claude", "codex", "opencode"}, response
      - name: Agent sidecar smoke
        shell: python
        env:
          SIDECAR: ${{ matrix.agent-binary }}
        run: |
          import json, os, subprocess, tempfile
          protocol = json.load(open("contracts/ipc.json", encoding="utf-8"))["protocol"]
          request = {
              "protocol": protocol, "id": "ci-health",
              "method": "health", "params": {},
          }
          with tempfile.TemporaryDirectory() as data_dir:
              env = {**os.environ, "FERRY_AGENT_DATA_DIR": data_dir}
              process = subprocess.run(
                  [os.environ["SIDECAR"]], input=json.dumps(request) + "\n",
                  text=True, capture_output=True, check=True, timeout=30, env=env)
          response = json.loads(process.stdout.splitlines()[-1])
          assert response["ok"] is True, (response, process.stderr)
          assert response["result"]["protocol"] == protocol, response
          assert response["result"]["provider"] == "deepseek", response
          assert response["result"]["model"] == "deepseek-v4-flash", response

  # macOS 构建跑在自托管 runner(本机)。安全闸:仅 push 到 main 时触发,
  # 任何 PR(含外部 fork)都不会在本机执行代码。停用请见 README/工作流历史。
  frozen-sidecar-macos:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-selfhosted
            target: aarch64-apple-darwin
            binary: app/src-tauri/binaries/ferry-engine-aarch64-apple-darwin
            agent-binary: app/src-tauri/binaries/ferry-agent-aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      # 自托管 runner 直接用本机预装的 Python 3.12 / Node / Rust(见 ~/actions-runner/.path)。
      # 不用 setup-python/setup-node:那些 action 下载的是托管机(/Users/runner)专用包,在本机会失败。
      - name: Verify local toolchain
        run: |
          python --version && node --version && cargo --version
          rustup target list --installed | grep -q "$BUILD_TARGET" || rustup target add "$BUILD_TARGET"
        env:
          BUILD_TARGET: ${{ matrix.target }}
      - run: python -m pip install -r requirements-build.txt
      - run: npm ci
        working-directory: agent-runtime
      - run: npm run build:sea -- "$BUILD_TARGET"
        shell: bash
        env:
          BUILD_TARGET: ${{ matrix.target }}
        working-directory: agent-runtime
      - run: python scripts/build-sidecar.py --clean --target "$BUILD_TARGET"
        shell: bash
        env:
          BUILD_TARGET: ${{ matrix.target }}
      - run: cargo check --locked --target "$BUILD_TARGET"
        shell: bash
        env:
          BUILD_TARGET: ${{ matrix.target }}
        working-directory: app/src-tauri
      - name: Frozen sidecar smoke
        shell: python
        env:
          SIDECAR: ${{ matrix.binary }}
        run: |
          import json, os, subprocess
          for method in ("health", "version", "env"):
              process = subprocess.run(
                  [os.environ["SIDECAR"], "rpc"],
                  input=json.dumps({"method": method}) + "\n",
                  text=True, capture_output=True, check=True, timeout=30)
              response = json.loads(process.stdout.splitlines()[0])
              assert response["ok"], (method, response, process.stderr)
              if method == "health":
                  assert response["result"]["status"] == "ok", response
              elif method == "version":
                  assert response["result"], response
              else:
                  assert set(response["result"]) == {"claude", "codex", "opencode"}, response
      - name: Agent sidecar smoke
        shell: python
        env:
          SIDECAR: ${{ matrix.agent-binary }}
        run: |
          import json, os, subprocess, tempfile
          protocol = json.load(open("contracts/ipc.json", encoding="utf-8"))["protocol"]
          request = {
              "protocol": protocol, "id": "ci-health",
              "method": "health", "params": {},
          }
          with tempfile.TemporaryDirectory() as data_dir:
              env = {**os.environ, "FERRY_AGENT_DATA_DIR": data_dir}
              process = subprocess.run(
                  [os.environ["SIDECAR"]], input=json.dumps(request) + "\n",
                  text=True, capture_output=True, check=True, timeout=30, env=env)
          response = json.loads(process.stdout.splitlines()[-1])
          assert response["ok"] is True, (response, process.stderr)
          assert response["result"]["protocol"] == protocol, response
          assert response["result"]["provider"] == "deepseek", response
          assert response["result"]["model"] == "deepseek-v4-flash", response
