name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}
      pub_date: ${{ steps.date.outputs.value }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - id: version
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: echo "value=$(python scripts/release.py check --tag "$RELEASE_TAG")" >> "$GITHUB_OUTPUT"
      - id: date
        run: echo "value=$(git log -1 --format=%cI)" >> "$GITHUB_OUTPUT"
      - name: Require release signing secrets
        env:
          UPDATER_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          UPDATER_PUBLIC_KEY: ${{ secrets.TAURI_UPDATER_PUBLIC_KEY }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          WINDOWS_CERTIFICATE_THUMBPRINT: ${{ secrets.WINDOWS_CERTIFICATE_THUMBPRINT }}
        shell: python
        run: |
          import os
          required = [name for name, value in os.environ.items() if name in {
            "UPDATER_PRIVATE_KEY", "UPDATER_PUBLIC_KEY", "APPLE_CERTIFICATE",
            "APPLE_CERTIFICATE_PASSWORD", "APPLE_SIGNING_IDENTITY", "APPLE_ID",
            "APPLE_PASSWORD", "APPLE_TEAM_ID", "WINDOWS_CERTIFICATE",
            "WINDOWS_CERTIFICATE_PASSWORD", "WINDOWS_CERTIFICATE_THUMBPRINT"
          } and not value]
          if required:
              raise SystemExit("missing release secrets: " + ", ".join(sorted(required)))

  build:
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14-xlarge
            platform: macos-aarch64
            target: aarch64-apple-darwin
            bundle-targets: app dmg
            bundle-paths: |
              app/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
              app/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz
              app/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz.sig
          - os: windows-2022
            platform: windows-x64
            target: x86_64-pc-windows-msvc
            bundle-targets: nsis
            bundle-paths: |
              app/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
              app/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.nsis.zip
              app/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.nsis.zip.sig
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-build.txt
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
        with:
          target: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: app/src-tauri
          key: ${{ matrix.target }}
      - run: python -m pip install -r requirements-build.txt
      - run: npm ci
        working-directory: app
      - run: python scripts/build-sidecar.py --clean --target "$BUILD_TARGET"
        env:
          BUILD_TARGET: ${{ matrix.target }}
      - name: Import macOS signing certificate
        if: runner.os == 'macOS'
        uses: apple-actions/import-codesign-certs@63fff01cd422d4b7b855d40ca1e9d34d2de9427d # v3
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      - name: Import Windows signing certificate
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          $path = Join-Path $env:RUNNER_TEMP "codesign.pfx"
          [IO.File]::WriteAllBytes($path, [Convert]::FromBase64String($env:CERTIFICATE))
          Import-PfxCertificate -FilePath $path -CertStoreLocation Cert:\CurrentUser\My -Password (ConvertTo-SecureString $env:CERTIFICATE_PASSWORD -AsPlainText -Force) | Out-Null
      - name: Generate repository-specific release config
        env:
          REPOSITORY: ${{ github.repository }}
          BUNDLE_TARGETS: ${{ matrix.bundle-targets }}
          UPDATER_PUBLIC_KEY: ${{ secrets.TAURI_UPDATER_PUBLIC_KEY }}
          WINDOWS_THUMBPRINT: ${{ secrets.WINDOWS_CERTIFICATE_THUMBPRINT }}
        run: >-
          python scripts/release.py config
          --output app/src-tauri/tauri.release.conf.json
          --repository "$REPOSITORY"
          --pubkey "$UPDATER_PUBLIC_KEY"
          --targets $BUNDLE_TARGETS
          --windows-thumbprint "$WINDOWS_THUMBPRINT"
        shell: bash
      - name: Build signed Tauri bundles and updater artifacts
        env:
          BUILD_TARGET: ${{ matrix.target }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run tauri build -- --target "$BUILD_TARGET" --config src-tauri/tauri.release.conf.json
        working-directory: app
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-${{ matrix.platform }}
          path: ${{ matrix.bundle-paths }}
          if-no-files-found: error
          retention-days: 7

  publish:
    needs: [validate, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true
      - name: Build complete updater manifest
        env:
          RELEASE_PUB_DATE: ${{ needs.validate.outputs.pub_date }}
          REPOSITORY: ${{ github.repository }}
          RELEASE_VERSION: ${{ needs.validate.outputs.version }}
        run: >-
          python scripts/release.py latest
          --assets release-assets
          --output release-assets/latest.json
          --repository "$REPOSITORY"
          --version "$RELEASE_VERSION"
          --notes "Ferry $RELEASE_VERSION"
      - name: Publish all assets atomically after aggregation
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
          RELEASE_VERSION: ${{ needs.validate.outputs.version }}
        shell: bash
        run: |
          shopt -s globstar nullglob
          assets=(release-assets/**/*.dmg release-assets/**/*.exe release-assets/**/*.gz release-assets/**/*.sig release-assets/latest.json)
          gh release create "$RELEASE_TAG" "${assets[@]}" --verify-tag --generate-notes --title "Ferry $RELEASE_VERSION"
