name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}
      pub_date: ${{ steps.date.outputs.value }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - id: version
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: echo "value=$(python scripts/release.py check --tag "$RELEASE_TAG")" >> "$GITHUB_OUTPUT"
      - id: date
        run: echo "value=$(git log -1 --format=%cI)" >> "$GITHUB_OUTPUT"
      - name: Require release signing secrets
        env:
          UPDATER_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          UPDATER_PUBLIC_KEY: ${{ secrets.TAURI_UPDATER_PUBLIC_KEY }}
        shell: python
        run: |
          import os
          required = [name for name in ("UPDATER_PRIVATE_KEY", "UPDATER_PUBLIC_KEY") if not os.environ.get(name)]
          if required:
              raise SystemExit("missing release secrets: " + ", ".join(sorted(required)))

  build:
    needs: validate
    runs-on: macos-14
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-build.txt
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            app/package-lock.json
            ferry-runtime/package-lock.json
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
        with:
          target: aarch64-apple-darwin
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: app/src-tauri -> target
          key: aarch64-apple-darwin
      - run: python -m pip install -r requirements-build.txt
      - run: npm ci
        working-directory: app
      - run: npm ci
        working-directory: ferry-runtime
      - run: npm run build:sea -- "$BUILD_TARGET"
        shell: bash
        env:
          BUILD_TARGET: aarch64-apple-darwin
        working-directory: ferry-runtime
      - run: python scripts/build-sidecar.py --clean --target "$BUILD_TARGET"
        shell: bash
        env:
          BUILD_TARGET: aarch64-apple-darwin
      - name: Detect optional macOS signing configuration
        id: macos-signing
        shell: python
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          import os

          apple = all(os.environ.get(name) for name in (
              "APPLE_CERTIFICATE", "APPLE_CERTIFICATE_PASSWORD", "APPLE_SIGNING_IDENTITY",
              "APPLE_ID", "APPLE_PASSWORD", "APPLE_TEAM_ID",
          ))
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"apple={'true' if apple else 'false'}\n")
          if not apple:
              warning = (
                  "::warning::macOS system signing is disabled because its complete certificate "
                  "and identity secret set is not configured. The updater artifacts remain signed, but "
                  "users may see Gatekeeper warnings."
              )
              print(warning)
              with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as summary:
                  summary.write(
                      "## macOS system signing disabled\n\n"
                      "The installer/application is not system-signed. The Tauri updater artifacts are still "
                      "cryptographically signed, but users may see Apple Gatekeeper warnings.\n"
                  )
      - name: Import macOS signing certificate
        if: steps.macos-signing.outputs.apple == 'true'
        uses: apple-actions/import-codesign-certs@63fff01cd422d4b7b855d40ca1e9d34d2de9427d # v3
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      - name: Generate release config
        env:
          REPOSITORY: ${{ github.repository }}
          BUNDLE_TARGETS: app dmg
          UPDATER_PUBLIC_KEY: ${{ secrets.TAURI_UPDATER_PUBLIC_KEY }}
        run: >-
          python scripts/release.py config
          --output app/src-tauri/tauri.release.conf.json
          --repository "$REPOSITORY"
          --pubkey "$UPDATER_PUBLIC_KEY"
          --targets $BUNDLE_TARGETS
        shell: bash
      - name: Build Tauri bundles and signed updater artifacts
        if: steps.macos-signing.outputs.apple != 'true'
        env:
          BUILD_TARGET: aarch64-apple-darwin
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build -- --target "$BUILD_TARGET" --config src-tauri/tauri.release.conf.json
        shell: bash
        working-directory: app
      - name: Build Apple-signed Tauri bundles and signed updater artifacts
        if: steps.macos-signing.outputs.apple == 'true'
        env:
          BUILD_TARGET: aarch64-apple-darwin
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run tauri build -- --target "$BUILD_TARGET" --config src-tauri/tauri.release.conf.json
        shell: bash
        working-directory: app
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-macos-aarch64
          path: |
            app/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            app/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz
            app/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz.sig
          if-no-files-found: error
          retention-days: 7

  publish:
    needs: [validate, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true
      - name: Extract release notes for this version from CHANGELOG.md
        env:
          RELEASE_VERSION: ${{ needs.validate.outputs.version }}
        run: >-
          python scripts/release.py notes
          --version "$RELEASE_VERSION"
          --output release-notes.md
      - name: Build complete updater manifest
        env:
          RELEASE_PUB_DATE: ${{ needs.validate.outputs.pub_date }}
          REPOSITORY: ${{ github.repository }}
          RELEASE_VERSION: ${{ needs.validate.outputs.version }}
        shell: bash
        run: >-
          python scripts/release.py latest
          --assets release-assets
          --output release-assets/latest.json
          --repository "$REPOSITORY"
          --version "$RELEASE_VERSION"
          --notes "$(cat release-notes.md)"
      - name: Publish all assets atomically after aggregation
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
          RELEASE_VERSION: ${{ needs.validate.outputs.version }}
        shell: bash
        run: |
          shopt -s globstar nullglob
          assets=(release-assets/**/*.dmg release-assets/**/*.gz release-assets/**/*.sig release-assets/latest.json)
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${assets[@]}" --clobber
            gh release edit "$RELEASE_TAG" --notes-file release-notes.md --title "Ferry $RELEASE_VERSION"
          else
            gh release create "$RELEASE_TAG" "${assets[@]}" --verify-tag --notes-file release-notes.md --title "Ferry $RELEASE_VERSION"
          fi
